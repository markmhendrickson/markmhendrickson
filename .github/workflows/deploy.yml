name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SKIP_WEBSITE_CACHE_REGEN: "1"
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      # Use REPO_ACCESS_TOKEN if shared (react-components) is private; otherwise GITHUB_TOKEN is enough
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_ACCESS_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        working-directory: react-app
        run: npm ci

      - name: Write Neotoma export JSON (from secret)
        working-directory: react-app
        env:
          NEOTOMA_WEBSITE_EXPORT_JSON: ${{ secrets.NEOTOMA_WEBSITE_EXPORT_JSON }}
        run: |
          if [ "${SKIP_WEBSITE_CACHE_REGEN}" = "1" ]; then
            rm -f data/tmp/neotoma_website_export.json
            echo "SKIP_WEBSITE_CACHE_REGEN=1; ignoring Neotoma export secret and using committed cache."
            exit 0
          fi
          mkdir -p data/tmp
          if [ -n "${NEOTOMA_WEBSITE_EXPORT_JSON:-}" ]; then
            # Never fail deploy on malformed secret; fall back to committed cache instead.
            if printf '%s' "$NEOTOMA_WEBSITE_EXPORT_JSON" | base64 --decode > data/tmp/neotoma_website_export.json 2>/dev/null; then
              echo "Using Neotoma export from secret."
            else
              rm -f data/tmp/neotoma_website_export.json
              echo "NEOTOMA_WEBSITE_EXPORT_JSON is not valid base64; using committed cache."
            fi
          else
            echo "NEOTOMA_WEBSITE_EXPORT_JSON secret not set; using committed cache."
          fi

      - name: Generate cache from Neotoma export
        working-directory: react-app
        run: |
          if [ "${SKIP_WEBSITE_CACHE_REGEN}" = "1" ]; then
            echo "SKIP_WEBSITE_CACHE_REGEN=1; using committed cache/*.json."
            exit 0
          fi
          if [ -f data/tmp/neotoma_website_export.json ]; then
            python3 ../../../scripts/generate_website_cache.py --from-neotoma-json data/tmp/neotoma_website_export.json
          else
            echo "No export file; skipping cache generation (using committed cache/*.json)."
          fi

      - name: Install locale translation dependency
        if: env.SKIP_WEBSITE_CACHE_REGEN != '1'
        working-directory: react-app
        run: |
          python3 -m venv .venv-i18n
          . .venv-i18n/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install deep-translator

      - name: Auto-translate missing post locales
        if: env.SKIP_WEBSITE_CACHE_REGEN != '1'
        working-directory: react-app
        run: |
          . .venv-i18n/bin/activate
          python3 scripts/generate_locale_translations.py

      - name: Regenerate cache with translated locale overrides
        working-directory: react-app
        run: |
          if [ "${SKIP_WEBSITE_CACHE_REGEN}" = "1" ]; then
            echo "SKIP_WEBSITE_CACHE_REGEN=1; skipping post-translation cache regeneration."
            exit 0
          fi
          if [ -f data/tmp/neotoma_website_export.json ]; then
            python3 ../../../scripts/generate_website_cache.py --from-neotoma-json data/tmp/neotoma_website_export.json
          else
            echo "No export file; cache already sourced from committed cache/*.json for this run."
          fi

      - name: Validate translation coverage for published posts
        if: env.SKIP_WEBSITE_CACHE_REGEN != '1'
        working-directory: react-app
        run: python3 scripts/validate_post_translations.py

      - name: Run i18n smoke checks
        if: env.SKIP_WEBSITE_CACHE_REGEN != '1'
        working-directory: react-app
        run: npm run test:i18n-smoke

      # Keep homepage bio deterministic from repo content even when export data is stale.
      - name: Force professional-mission from repo content
        working-directory: react-app
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          md_path = root / 'src' / 'content' / 'posts' / 'professional-mission.md'
          manifest_path = root / 'src' / 'content' / 'posts' / 'posts.json'
          cache_posts_path = root / 'cache' / 'posts.json'
          cache_api_posts_path = root / 'cache' / 'api' / 'posts.json'

          body = md_path.read_text(encoding='utf-8')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          src = next((p for p in manifest if p.get('slug') == 'professional-mission'), None)
          if src is None:
            raise RuntimeError('professional-mission not found in src/content/posts/posts.json')

          def patch_post(post: dict) -> None:
            post['title'] = src.get('title', post.get('title', 'Mark Hendrickson'))
            post['excerpt'] = src.get('excerpt', post.get('excerpt', ''))
            post['body'] = body
            post['published'] = True
            post['publishedDate'] = src.get('publishedDate', post.get('publishedDate', '2025-01-01'))
            post['category'] = src.get('category', post.get('category', 'essay'))
            post['heroImage'] = src.get('heroImage', post.get('heroImage', 'profile.jpg'))
            post['heroImageStyle'] = src.get('heroImageStyle', post.get('heroImageStyle', 'float-right'))
            post['excludeFromListing'] = src.get('excludeFromListing', post.get('excludeFromListing', True))
            post['showMetadata'] = src.get('showMetadata', post.get('showMetadata', False))

          cache_posts = json.loads(cache_posts_path.read_text(encoding='utf-8'))
          entry = next((p for p in cache_posts if p.get('slug') == 'professional-mission'), None)
          if entry is None:
            entry = {'slug': 'professional-mission'}
            cache_posts.append(entry)
          patch_post(entry)
          cache_posts_path.write_text(json.dumps(cache_posts, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          api_payload = json.loads(cache_api_posts_path.read_text(encoding='utf-8'))
          posts = api_payload.get('posts') or []
          api_entry = next((p for p in posts if p.get('slug') == 'professional-mission'), None)
          if api_entry is None:
            api_entry = {'slug': 'professional-mission'}
            posts.append(api_entry)
          patch_post(api_entry)
          api_payload['posts'] = posts
          cache_api_posts_path.write_text(json.dumps(api_payload, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          print('Forced professional-mission in cache/posts.json and cache/api/posts.json')
          PY

      # Copy cache/api/*.json to public/api/ so Vite includes them in dist; live /api/* endpoints stay in sync
      - name: Copy API cache to public
        working-directory: react-app
        run: |
          mkdir -p public/api
          for f in cache/api/*.json; do
            [ -f "$f" ] && cp "$f" public/api/
          done

      - name: Build
        working-directory: react-app
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build:ci

      # 404.html is generated by prerender (NotFound page) for unknown paths
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: react-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
