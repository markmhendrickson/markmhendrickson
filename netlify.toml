# SSR: build runs client bundle + SSR bundle + prerender so every page is server-rendered HTML.
# Do not use plain "npm run build" (client-only); use build:ci so view-source and crawlers get full content.
[build]
  base = "."
  command = "cd react-app && npm ci && npm run build:ci"
  publish = "react-app/dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# Branch deploys: any non-production branch gets its own deploy URL.
# dev branch → dev--<site-name>.netlify.app (configure dev.markmhendrickson.com as branch subdomain in Netlify UI)
[context.branch-deploy]
  command = "cd react-app && npm ci && npm run build:ci"

[context.dev]
  command = "cd react-app && npm ci && npm run build:ci"
  [context.dev.environment]
    VITE_SITE_ENV = "development"

# Redirect TLD JSON to canonical /api/ paths (absolute URLs in mcp.json use /api/)
[[redirects]]
  from = "/timeline.json"
  to = "/api/timeline.json"
  status = 302
[[redirects]]
  from = "/posts.json"
  to = "/api/posts.json"
  status = 302
[[redirects]]
  from = "/links.json"
  to = "/api/links.json"
  status = 302
[[redirects]]
  from = "/agent.json"
  to = "/api/agent.json"
  status = 302

# Permanent redirect: old /social path to /links
[[redirects]]
  from = "/social"
  to = "/links"
  status = 301

# Aliases (canonical URLs are /meet and /)
[[redirects]]
  from = "/schedule"
  to = "/meet"
  status = 301
[[redirects]]
  from = "/about"
  to = "/"
  status = 301

# Trailing slash on posts: /posts/slug/ -> /posts/slug (canonical). Root-level /slug -> /posts/slug is generated at build time in dist/_redirects.
[[redirects]]
  from = "/posts/*/"
  to = "/posts/:splat"
  status = 301

# Strip .md extension from post URLs (alternate link for markdown clients should not 5xx when crawled)
[[redirects]]
  from = "/posts/*.md"
  to = "/posts/:splat"
  status = 301
[[redirects]]
  from = "/:locale/posts/*.md"
  to = "/:locale/posts/:splat"
  status = 301

